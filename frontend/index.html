<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IG Follow Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d1117;
  --surface:#0d1117;
  --surface2:#161b22;
  --border:#21262d;
  --border2:#30363d;
  --cyan:#79c0ff;
  --teal:#56d364;
  --teal2:#3fb950;
  --orange:#ffa657;
  --text:#e6edf3;
  --muted:#8b949e;
  --red:#f85149;
  --red-bg:rgba(248,81,73,0.1);
  --mono:'Share Tech Mono',monospace;
  --sans:'Space Grotesk',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px}
.wrap{max-width:700px;margin:0 auto;padding:40px 20px 80px;position:relative}

/* header */
.tag{font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:14px}
.tag span{color:var(--cyan)}
.title{font-family:var(--sans);font-size:clamp(26px,6vw,46px);font-weight:700;line-height:1.1;color:var(--text);letter-spacing:-0.5px;margin-bottom:6px}
.title em{color:var(--teal);font-style:normal}
.sub{font-size:11px;color:var(--muted);letter-spacing:2px;margin-bottom:40px}

/* terminal box */
.term{background:var(--surface2);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:16px}
.term-bar{background:#1c2128;border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%}
.dot.r{background:#f85149}.dot.y{background:#e3b341}.dot.g{background:#3fb950}
.term-title{font-size:11px;color:var(--muted);margin-left:8px;letter-spacing:1px}
.term-body{padding:20px}

/* input */
.input-row{display:flex;gap:8px;flex-wrap:wrap}
input[type=text]{
  flex:1;min-width:180px;background:var(--bg);
  border:1px solid var(--border2);border-radius:6px;
  color:var(--cyan);font-family:var(--mono);font-size:14px;
  padding:10px 14px;outline:none;transition:border-color .2s,box-shadow .2s
}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--teal2);box-shadow:0 0 0 3px rgba(63,185,80,0.1)}
.btn{
  background:#238636;border:1px solid #2ea043;
  color:#fff;font-family:var(--mono);font-size:13px;
  padding:10px 22px;border-radius:6px;cursor:pointer;
  letter-spacing:1px;transition:all .15s;white-space:nowrap;font-weight:500
}
.btn:hover:not(:disabled){background:#2ea043}
.btn:disabled{opacity:.4;cursor:not-allowed}
.note{font-size:11px;color:var(--muted);margin-top:10px}

/* log */
#log{display:none;font-size:12px;color:var(--muted);line-height:1.9;padding:14px 20px;border-top:1px solid var(--border)}
.lg{display:block}.lg.g{color:var(--teal)}.lg.r{color:var(--red)}

/* stats */
#stats{display:none;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:16px 20px}
.stat-n{font-family:var(--sans);font-size:28px;font-weight:700;color:var(--text);display:block}
.stat-l{font-size:11px;color:var(--muted);letter-spacing:1px;margin-top:2px;display:block}

/* error */
#err{display:none;background:var(--red-bg);border:1px solid rgba(248,81,73,0.3);border-radius:6px;padding:12px 16px;color:var(--red);font-size:12px;margin-bottom:16px}

/* results */
#results{display:none}
.section{background:var(--surface2);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;overflow:hidden}
.sec-head{padding:12px 18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;border-bottom:1px solid var(--border)}
.sec-head:hover{background:rgba(255,255,255,0.02)}
.sec-title{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sec-title.r{color:var(--red)}.sec-title.g{color:var(--teal)}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-family:var(--mono)}
.badge.r{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,0.3)}
.badge.g{background:rgba(63,185,80,0.1);color:var(--teal2);border:1px solid rgba(63,185,80,0.3)}
.chips{padding:12px 14px;display:flex;flex-wrap:wrap;gap:6px;max-height:260px;overflow-y:auto}
.chip{background:var(--bg);border:1px solid var(--border2);border-radius:4px;padding:4px 10px;font-size:12px;text-decoration:none;color:var(--muted);transition:all .15s}
.chip:hover{border-color:var(--teal2);color:var(--teal)}
.chip.r:hover{border-color:var(--red);color:var(--red)}
.empty{padding:18px;font-size:12px;color:var(--muted);text-align:center}

/* spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:12px;height:12px;border:2px solid rgba(63,185,80,0.2);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}

@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}
.cur{animation:bl 1s infinite}

::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@media(max-width:480px){.input-row{flex-direction:column}.btn{width:100%}#stats{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">

  <div class="tag">// <span>IG_CHECKER</span> — initialized — v1.0.0</div>
  <div class="title">Follow<em>Check</em><span class="cur">_</span></div>
  <div class="sub">PUBLIC ACCOUNTS ONLY · NO LOGIN REQUIRED</div>

  <div class="term">
    <div class="term-bar">
      <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
      <span class="term-title">bash — ig-checker</span>
    </div>
    <div class="term-body">
      <div style="margin-bottom:12px;font-size:12px;color:var(--muted)">~/ig-checker $ <span style="color:var(--cyan)">run --username</span></div>
      <div class="input-row">
        <input type="text" id="username" placeholder="piachchatkup" autocomplete="off" autocorrect="off" spellcheck="false"/>
        <button class="btn" id="btn" onclick="run()">▶ RUN</button>
      </div>
      <div class="note">⚠ private accounts will not work</div>
    </div>
    <div id="log"></div>
  </div>

  <div id="err"></div>

  <div id="stats">
    <div class="stat">
      <span class="stat-n" id="sfl">0</span>
      <span class="stat-l">Followers</span>
    </div>
    <div class="stat">
      <span class="stat-n" id="sfg">0</span>
      <span class="stat-l">Following</span>
    </div>
  </div>

  <div id="results">
    <div class="section">
      <div class="sec-head" onclick="tog('l1')">
        <span class="sec-title r">⚠ Not following back</span>
        <span class="badge r" id="b1">0</span>
      </div>
      <div id="l1" class="chips"></div>
    </div>
    <div class="section">
      <div class="sec-head" onclick="tog('l2')">
        <span class="sec-title g">✓ You don't follow back</span>
        <span class="badge g" id="b2">0</span>
      </div>
      <div id="l2" class="chips"></div>
    </div>
  </div>

</div>
<script>
const API="http://localhost:3000"; // ← เปลี่ยนเป็น Render URL หลัง deploy
const $=id=>document.getElementById(id);
function lg(t,c=''){$('log').style.display='block';const s=document.createElement('span');s.className='lg '+c;s.textContent='~/ig-checker $ '+t;$('log').appendChild(s);$('log').scrollTop=9999}
function clearAll(){['log','err','results'].forEach(id=>{const e=$(id);e.style.display='none';if(id==='log')e.innerHTML=''});$('stats').style.display='none';$('l1').innerHTML='';$('l2').innerHTML=''}
function showErr(m){$('err').textContent='✗ error: '+m;$('err').style.display='block'}
function tog(id){const e=$(id);e.style.display=e.style.display==='none'?'flex':'none'}
function chips(cid,bid,list,cls){
  $(bid).textContent=list.length;
  const el=$(cid);
  if(!list.length){el.innerHTML='<div class="empty">— none —</div>';return}
  el.innerHTML=list.map(u=>`<a class="chip ${cls}" href="https://instagram.com/${u}" target="_blank" rel="noopener">@${u}</a>`).join('')
}
async function run(){
  const u=$('username').value.trim().replace(/^@/,'');
  if(!u)return;
  clearAll();
  const btn=$('btn');btn.disabled=true;btn.innerHTML='<span class="sp"></span>scanning...';
  lg(`fetching data for @${u}...`);
  try{
    const res=await fetch(`${API}/check`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u})});
    const d=await res.json();
    if(!res.ok)throw new Error(d.detail||'request failed');
    lg(`done. ${d.followers_count} followers · ${d.following_count} following`,'g');
    $('stats').style.display='grid';$('sfl').textContent=d.followers_count;$('sfg').textContent=d.following_count;
    $('results').style.display='block';
    chips('l1','b1',d.not_following_back,'r');
    chips('l2','b2',d.not_followed_back,'g');
  }catch(e){lg('error: '+e.message,'r');showErr(e.message)}
  finally{btn.disabled=false;btn.innerHTML='▶ RUN'}
}
$('username').addEventListener('keydown',e=>{if(e.key==='Enter')run()});
</script>
</body>
</html>
