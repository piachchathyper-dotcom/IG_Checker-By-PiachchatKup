<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Follow Checker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a05;
      --bg2: #090f09;
      --panel: #0c140c;
      --border: #1a3a1a;
      --green: #00ff41;
      --green-dim: #00cc33;
      --green-faint: #003310;
      --green-glow: rgba(0,255,65,0.15);
      --red: #ff3a3a;
      --red-faint: #2a0000;
      --text: #c8f0c8;
      --muted: #4a7a4a;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Rajdhani', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,65,0.015) 2px,
        rgba(0,255,65,0.015) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* grid bg */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* HEADER */
    header {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo-line {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 4px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    h1 {
      font-family: var(--sans);
      font-size: clamp(32px, 8vw, 58px);
      font-weight: 700;
      color: var(--green);
      text-shadow: 0 0 30px rgba(0,255,65,0.5), 0 0 60px rgba(0,255,65,0.2);
      letter-spacing: 2px;
      line-height: 1;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      letter-spacing: 2px;
    }

    /* BLINK */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { animation: blink 1s infinite; }

    /* SEARCH BOX */
    .search-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 0 40px rgba(0,255,65,0.05), inset 0 1px 0 rgba(0,255,65,0.05);
    }

    .input-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 200px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: var(--mono);
      font-size: 16px;
      padding: 12px 16px;
      border-radius: 4px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus {
      border-color: var(--green-dim);
      box-shadow: 0 0 15px var(--green-glow);
    }

    button#checkBtn {
      background: var(--green-faint);
      border: 1px solid var(--green-dim);
      color: var(--green);
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 28px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    button#checkBtn:hover:not(:disabled) {
      background: rgba(0,255,65,0.15);
      box-shadow: 0 0 20px var(--green-glow);
    }

    button#checkBtn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* TERMINAL LOG */
    #log {
      display: none;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--muted);
      min-height: 60px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.8;
    }

    #log .log-line { display: block; }
    #log .log-line.green { color: var(--green-dim); }
    #log .log-line.red { color: var(--red); }

    /* STATS */
    #stats {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 18px;
      text-align: center;
    }

    .stat-num {
      font-family: var(--sans);
      font-size: 36px;
      font-weight: 700;
      color: var(--green);
      display: block;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* RESULTS */
    #results { display: none; }

    .result-section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .result-header {
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }

    .result-header:hover { background: rgba(0,255,65,0.03); }

    .result-title {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .result-title.red { color: var(--red); }
    .result-title.green { color: var(--green); }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      font-family: var(--mono);
    }

    .badge.red { background: var(--red-faint); color: var(--red); border: 1px solid rgba(255,58,58,0.3); }
    .badge.green { background: var(--green-faint); color: var(--green-dim); border: 1px solid rgba(0,204,51,0.3); }

    .user-list {
      padding: 12px 16px;
      max-height: 300px;
      overflow-y: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .user-chip {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 5px 12px;
      font-size: 12px;
      text-decoration: none;
      transition: all 0.15s;
    }

    .user-chip:hover {
      border-color: var(--green-dim);
      color: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
    }

    .user-chip.red { color: var(--red); }
    .user-chip.green { color: var(--green-dim); }

    .empty-msg {
      padding: 20px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 1px;
    }

    /* ERROR */
    #error-box {
      display: none;
      background: var(--red-faint);
      border: 1px solid rgba(255,58,58,0.3);
      border-radius: 4px;
      padding: 16px 20px;
      color: var(--red);
      font-size: 13px;
      margin-bottom: 16px;
    }

    /* LOADING spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--green-faint);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* mobile */
    @media (max-width: 480px) {
      .input-row { flex-direction: column; }
      button#checkBtn { width: 100%; }
      #stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-line">// system ready</div>
    <h1>IG FOLLOW<br>CHECKER<span class="cursor">_</span></h1>
    <div class="subtitle">[ PUBLIC ACCOUNTS ONLY ]</div>
  </header>

  <div class="search-box">
    <label class="input-label" for="username">→ instagram username</label>
    <div class="input-row">
      <input type="text" id="username" placeholder="@username" autocomplete="off" autocorrect="off" spellcheck="false" />
      <button id="checkBtn" onclick="runCheck()">RUN_</button>
    </div>
    <div class="note">⚠ works with public accounts only · no login required</div>
  </div>

  <div id="error-box"></div>
  <div id="log"></div>

  <div id="stats" style="display:none; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:24px;">
    <div class="stat-card">
      <span class="stat-num" id="stat-followers">0</span>
      <span class="stat-label">Followers</span>
    </div>
    <div class="stat-card">
      <span class="stat-num" id="stat-following">0</span>
      <span class="stat-label">Following</span>
    </div>
  </div>

  <div id="results">
    <div class="result-section">
      <div class="result-header" onclick="toggleSection('list-nfb', this)">
        <span class="result-title red">NOT FOLLOWING BACK</span>
        <span class="badge red" id="badge-nfb">0</span>
      </div>
      <div id="list-nfb" class="user-list"></div>
    </div>

    <div class="result-section">
      <div class="result-header" onclick="toggleSection('list-dnfb', this)">
        <span class="result-title green">YOU DON'T FOLLOW BACK</span>
        <span class="badge green" id="badge-dnfb">0</span>
      </div>
      <div id="list-dnfb" class="user-list"></div>
    </div>
  </div>

</div>

<script>
  // ← ตรงนี้เปลี่ยน URL เป็น backend จริงของมึง
  const API_BASE = "http://localhost:8000";

  const logEl = document.getElementById("log");
  const errEl = document.getElementById("error-box");
  const statsEl = document.getElementById("stats");
  const resultsEl = document.getElementById("results");

  function log(msg, type = "") {
    logEl.style.display = "block";
    const line = document.createElement("span");
    line.className = `log-line ${type}`;
    line.textContent = `> ${msg}`;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function clearAll() {
    logEl.innerHTML = "";
    logEl.style.display = "none";
    errEl.style.display = "none";
    statsEl.style.display = "none";
    resultsEl.style.display = "none";
    document.getElementById("list-nfb").innerHTML = "";
    document.getElementById("list-dnfb").innerHTML = "";
  }

  function showError(msg) {
    errEl.textContent = `✗ ${msg}`;
    errEl.style.display = "block";
  }

  function renderList(containerId, badgeId, users, colorClass) {
    const el = document.getElementById(containerId);
    const badge = document.getElementById(badgeId);
    badge.textContent = users.length;
    if (users.length === 0) {
      el.innerHTML = `<div class="empty-msg">— none found —</div>`;
      return;
    }
    el.innerHTML = users.map(u =>
      `<a class="user-chip ${colorClass}" href="https://instagram.com/${u}" target="_blank" rel="noopener">@${u}</a>`
    ).join("");
  }

  function toggleSection(id, header) {
    const el = document.getElementById(id);
    el.style.display = el.style.display === "none" ? "flex" : "none";
  }

  async function runCheck() {
    const raw = document.getElementById("username").value.trim().replace(/^@/, "");
    if (!raw) return;

    clearAll();

    const btn = document.getElementById("checkBtn");
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span>SCANNING_`;

    log(`initiating scan for @${raw}...`);
    log(`connecting to instagram api...`);

    try {
      const res = await fetch(`${API_BASE}/check`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: raw })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.detail || "Something went wrong");
      }

      log(`fetched ${data.followers_count} followers · ${data.following_count} following`, "green");
      log(`analysis complete.`, "green");

      statsEl.style.display = "grid";
      document.getElementById("stat-followers").textContent = data.followers_count;
      document.getElementById("stat-following").textContent = data.following_count;

      resultsEl.style.display = "block";
      renderList("list-nfb", "badge-nfb", data.not_following_back, "red");
      renderList("list-dnfb", "badge-dnfb", data.not_followed_back, "green");

    } catch (e) {
      log(`error: ${e.message}`, "red");
      showError(e.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = "RUN_";
    }
  }

  document.getElementById("username").addEventListener("keydown", e => {
    if (e.key === "Enter") runCheck();
  });
</script>
</body>
</html>
